name: "Service CI"

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        default: "24.14.0"
        type: string
      service-name:
        required: true
        type: string

jobs:
  check:
    name: Build & Test (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Yarn
        uses: Volontariapp/ci-tools/.github/actions/setup-node-yarn@main
        with:
          node-version: ${{ inputs.node-version }}
          cache: "yarn"

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Check Build
        run: yarn build

      - name: Run Tests
        run: yarn test

  validate-versions:
    name: Validate Versions (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for temporary versions
        uses: Volontariapp/ci-tools/.github/actions/validate-package-versions@main

  repo-deploy-push:
    name: Deploy Repo Submodule Push (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    needs:
      - check
      - validate-versions
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Deploy Repository
        uses: actions/checkout@v4
        with:
          repository: Volontariapp/deploy
          token: ${{ secrets.ORG_REPO_TOKEN }}
          path: deploy

      - name: Update service submodule in deploy repository
        env:
          ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
          SERVICE: "${{ github.event.repository.name }}"
          SERVICE_SHA: "${{ github.sha }}"
        run: |
          if [ -z "$ORG_REPO_TOKEN" ]; then
            echo "ORG_REPO_TOKEN is empty. Ensure 'secrets: inherit' is used in the caller workflow."
            exit 1
          fi

          cd deploy

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${ORG_REPO_TOKEN}@github.com/".insteadOf "git@github.com:"

          if [ ! -d "$SERVICE" ]; then
            echo "No matching submodule path '$SERVICE' in deploy repository, skipping."
            exit 1
          fi

          git submodule update --init "$SERVICE"
          git -C "$SERVICE" fetch origin "$SERVICE_SHA"
          git -C "$SERVICE" checkout "$SERVICE_SHA"

          if ! git diff --quiet "$SERVICE"; then
            git add "$SERVICE"
            git commit -m "chore(deploy): update $SERVICE submodule to ${SERVICE_SHA:0:7}"

            for i in {1..5}; do
              git pull --rebase origin main && git push origin main && break || {
                if [ $i -eq 5 ]; then
                  echo "Max retries reached. Push to deploy repository failed."
                  exit 1
                fi
                echo "Concurrency detected on deploy repository. Retrying in $((i * 2)) seconds (attempt $i/5)..."
                sleep $((i * 2))
              }
            done
          else
            echo "No deploy submodule change for $SERVICE"
          fi
