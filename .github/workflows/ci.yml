name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci:
    uses: Volontariapp/ci-tools/.github/workflows/service-ci.yml@main
    with:
      service-name: ms-social
    secrets: inherit

  smoke-test:
    needs: ci
    uses: Volontariapp/ci-tools/.github/workflows/service-docker-smoke.yml@main
    with:
      service-name: ms-social
      db-name: "ms_social"
      db-user: "user"
      db-password: "password"
      db-type: "postgres-neo4j"
      port: 3004
    secrets: inherit

  ci-docker:
    needs: ci
    permissions:
      contents: read
      packages: write
    uses: Volontariapp/ci-tools/.github/workflows/service-docker-build-push.yml@main
    with:
      service-name: ms-social
    secrets: inherit

  e2e:
    needs: [ci-docker, smoke-test]
    uses: Volontariapp/ci-tools/.github/workflows/e2e-orchestrator.yml@main
    secrets: inherit

  validate-e2e-matrix:
    uses: Volontariapp/ci-tools/.github/workflows/e2e-matrix-checker.yml@main
    with:
      service-name: ms-social

  deploy-push:
    name: Deploy Repo Submodule Push (ms-social)
    needs: [ci-docker, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Update Deploy Submodule and Images
        uses: Volontariapp/ci-tools/.github/actions/update-deploy@main
        with:
          service: ms-social
          sha: ${{ github.sha }}
          org-repo-token: ${{ secrets.ORG_REPO_TOKEN }}
          image-match: 'ghcr.io/volontariapp/ms-social'
